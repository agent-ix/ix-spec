name: write-us
version: 0.1.0
description: Create User Story or use-case artifacts.
initialPhase: intake
phases:
  - { name: intake }
  - { name: artifact_rendered }
  - { name: validated }
  - { name: accepted, terminal: true }
transitions:
  - from: intake
    to: artifact_rendered
    invariants:
      - "interview.complete:request"
    defaultGate: auto
  - from: artifact_rendered
    to: validated
    invariants:
      - "artifact.frontmatter_valid:use_case"
    defaultGate: auto
  - from: validated
    to: accepted
    invariants: []
    defaultGate: hitl
itemSchemas:
  us_answers: {}
  UseCaseSchema:
    required: [id, slug, title, actor, goal, traces_to]
    properties:
      id: { type: string }
      slug: { type: string }
      title: { type: string }
      actor: { type: string }
      goal: { type: string }
      traces_to: { type: string }
linkSchemas: {}
interviews:
  request:
    itemType: us_answers
    completenessRule: all_required
    questions:
      - key: artifact_id
        prompt: "Use case id, for example US-001."
        type: text
        required: true
      - key: slug
        prompt: "Filename slug without the id."
        type: text
        required: true
      - key: title
        prompt: "Use case title."
        type: text
        required: true
      - key: actor
        prompt: "Primary actor."
        type: text
        required: true
      - key: goal
        prompt: "User goal or outcome."
        type: text
        required: true
      - key: traces_to
        prompt: "Upstream stakeholder requirement id."
        type: text
        required: true
artifactTemplates:
  use_case:
    source: templates/usecase/default.md
    target: spec/usecase/${items.us_answers.request.artifact_id}-${items.us_answers.request.slug}.md
    phase: artifact_rendered
    frontmatterSchema: UseCaseSchema
recipes:
  create-and-validate:
    description: Render the artifact from typed inputs, validate it, then stop at the acceptance gate.
    steps:
      - command: advance
        to: artifact_rendered
      - command: advance
        to: validated
      - command: advance
        to: accepted
