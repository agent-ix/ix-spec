name: write-it
version: 0.1.0
description: Create implementation-test or integration-test specification artifacts.
initialPhase: intake
phases:
  - { name: intake }
  - { name: artifact_rendered }
  - { name: validated }
  - { name: accepted, terminal: true }
transitions:
  - from: intake
    to: artifact_rendered
    invariants:
      - "interview.complete:request"
    defaultGate: auto
  - from: artifact_rendered
    to: validated
    invariants:
      - "artifact.frontmatter_valid:test_intent"
    defaultGate: auto
  - from: validated
    to: accepted
    invariants: []
    defaultGate: hitl
itemSchemas:
  it_answers: {}
  TestIntentSchema:
    required: [id, slug, title, verifies, scenario, evidence]
    properties:
      id: { type: string }
      slug: { type: string }
      title: { type: string }
      verifies: { type: string }
      scenario: { type: string }
      evidence: { type: string }
linkSchemas: {}
interviews:
  request:
    itemType: it_answers
    completenessRule: all_required
    questions:
      - key: artifact_id
        prompt: "Test intent id, for example TC-001."
        type: text
        required: true
      - key: slug
        prompt: "Filename slug without the id."
        type: text
        required: true
      - key: title
        prompt: "Test intent title."
        type: text
        required: true
      - key: verifies
        prompt: "Requirement id verified by this test."
        type: text
        required: true
      - key: scenario
        prompt: "Verification scenario."
        type: text
        required: true
      - key: evidence
        prompt: "Expected evidence."
        type: text
        required: true
artifactTemplates:
  test_intent:
    source: templates/test-intent/default.md
    target: spec/test_cases/${items.it_answers.request.artifact_id}-${items.it_answers.request.slug}.md
    phase: artifact_rendered
    frontmatterSchema: TestIntentSchema
recipes:
  create-and-validate:
    description: Render the artifact from typed inputs, validate it, then stop at the acceptance gate.
    steps:
      - command: advance
        to: artifact_rendered
      - command: advance
        to: validated
      - command: advance
        to: accepted
