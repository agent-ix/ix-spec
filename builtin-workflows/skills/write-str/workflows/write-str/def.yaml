name: write-str
version: 0.1.0
description: Create Stakeholder Requirement artifacts.
initialPhase: intake
phases:
  - { name: intake }
  - { name: artifact_rendered }
  - { name: validated }
  - { name: accepted, terminal: true }
transitions:
  - from: intake
    to: artifact_rendered
    invariants:
      - "interview.complete:request"
    defaultGate: auto
  - from: artifact_rendered
    to: validated
    invariants:
      - "artifact.frontmatter_valid:stakeholder_requirement"
    defaultGate: auto
  - from: validated
    to: accepted
    invariants: []
    defaultGate: hitl
itemSchemas:
  str_answers: {}
  StakeholderRequirementSchema:
    required: [id, slug, title, source, need]
    properties:
      id: { type: string }
      slug: { type: string }
      title: { type: string }
      source: { type: string }
      need: { type: string }
linkSchemas: {}
interviews:
  request:
    itemType: str_answers
    completenessRule: all_required
    questions:
      - key: artifact_id
        prompt: "Stakeholder requirement id, for example StR-001."
        type: text
        required: true
      - key: slug
        prompt: "Filename slug without the id."
        type: text
        required: true
      - key: title
        prompt: "Stakeholder requirement title."
        type: text
        required: true
      - key: source
        prompt: "Authoritative stakeholder source."
        type: text
        required: true
      - key: need
        prompt: "Stakeholder need or constraint."
        type: text
        required: true
artifactTemplates:
  stakeholder_requirement:
    source: templates/stakeholder/default.md
    target: spec/stakeholder/${items.str_answers.request.artifact_id}-${items.str_answers.request.slug}.md
    phase: artifact_rendered
    frontmatterSchema: StakeholderRequirementSchema
recipes:
  create-and-validate:
    description: Render the artifact from typed inputs, validate it, then stop at the acceptance gate.
    steps:
      - command: advance
        to: artifact_rendered
      - command: advance
        to: validated
      - command: advance
        to: accepted
