name: matrix
version: 0.1.0
description: Build and update requirements test matrices.
initialPhase: intake
phases:
  - { name: intake }
  - { name: evidence_recorded }
  - { name: report_rendered }
  - { name: validated }
  - { name: accepted, terminal: true }
transitions:
  - from: intake
    to: evidence_recorded
    invariants:
      - "interview.complete:request"
    defaultGate: auto
  - from: evidence_recorded
    to: report_rendered
    invariants: []
    defaultGate: auto
  - from: report_rendered
    to: validated
    invariants:
      - "artifact.frontmatter_valid:report"
    defaultGate: auto
  - from: validated
    to: accepted
    invariants: []
    defaultGate: hitl
itemSchemas:
  operation_request: {}
  OperationReportSchema:
    required: [artifact_type, id, title, scope]
    properties:
      artifact_type: { type: string }
      id: { type: string }
      title: { type: string }
      scope: { type: string }
linkSchemas: {}
interviews:
  request:
    itemType: operation_request
    completenessRule: all_required
    questions:
      - key: artifact_id
        prompt: "Report id, for example REPORT-001."
        type: text
        required: true
      - key: title
        prompt: "Report title."
        type: text
        required: true
      - key: scope
        prompt: "Spec paths, requirement ids, or graph scope to inspect."
        type: text
        required: true
      - key: evidence
        prompt: "Evidence sources used for this operation."
        type: text
        required: true
      - key: findings
        prompt: "Findings, gaps, or result summary."
        type: text
        required: true
artifactTemplates:
  report:
    source: templates/report/default.md
    target: spec/reports/matrix/${items.operation_request.request.artifact_id}.md
    phase: report_rendered
    frontmatterSchema: OperationReportSchema
recipes:
  run-to-review:
    description: Record inputs, render the operation report, validate it, then stop at acceptance.
    steps:
      - command: advance
        to: evidence_recorded
      - command: advance
        to: report_rendered
      - command: advance
        to: validated
      - command: advance
        to: accepted
