name: write-nfr
version: 0.1.0
description: Create Non-Functional Requirement artifacts.
initialPhase: intake
phases:
  - { name: intake }
  - { name: artifact_rendered }
  - { name: validated }
  - { name: accepted, terminal: true }
transitions:
  - from: intake
    to: artifact_rendered
    invariants:
      - "interview.complete:request"
    defaultGate: auto
  - from: artifact_rendered
    to: validated
    invariants:
      - "artifact.frontmatter_valid:non_functional_requirement"
    defaultGate: auto
  - from: validated
    to: accepted
    invariants: []
    defaultGate: hitl
itemSchemas:
  nfr_answers: {}
  NonFunctionalRequirementSchema:
    required: [id, slug, title, quality, constraint, verification]
    properties:
      id: { type: string }
      slug: { type: string }
      title: { type: string }
      quality: { type: string }
      constraint: { type: string }
      verification: { type: string }
linkSchemas: {}
interviews:
  request:
    itemType: nfr_answers
    completenessRule: all_required
    questions:
      - key: artifact_id
        prompt: "NFR id, for example NFR-001."
        type: text
        required: true
      - key: slug
        prompt: "Filename slug without the id."
        type: text
        required: true
      - key: title
        prompt: "NFR title."
        type: text
        required: true
      - key: quality
        prompt: "Quality attribute."
        type: text
        required: true
      - key: constraint
        prompt: "Measurable constraint."
        type: text
        required: true
      - key: verification
        prompt: "Verification method."
        type: text
        required: true
artifactTemplates:
  non_functional_requirement:
    source: templates/non-functional/default.md
    target: spec/non-functional/${items.nfr_answers.request.artifact_id}-${items.nfr_answers.request.slug}.md
    phase: artifact_rendered
    frontmatterSchema: NonFunctionalRequirementSchema
recipes:
  create-and-validate:
    description: Render the artifact from typed inputs, validate it, then stop at the acceptance gate.
    steps:
      - command: advance
        to: artifact_rendered
      - command: advance
        to: validated
      - command: advance
        to: accepted
