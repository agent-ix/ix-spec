name: to-plan
version: 0.1.0
description: Convert accepted requirements into a traced implementation plan.
initialPhase: intake
phases:
  - { name: intake }
  - { name: evidence_recorded }
  - { name: plan_drafted }
  - { name: validated }
  - { name: accepted, terminal: true }
transitions:
  - from: intake
    to: evidence_recorded
    invariants:
      - "interview.complete:plan"
    defaultGate: auto
  - from: evidence_recorded
    to: plan_drafted
    invariants: []
    defaultGate: auto
  - from: plan_drafted
    to: validated
    invariants:
      - "artifact.frontmatter_valid:implementation_plan"
    defaultGate: auto
  - from: validated
    to: accepted
    invariants: []
    defaultGate: hitl
itemSchemas:
  plan_answers: {}
  ImplementationPlanSchema:
    required: [artifact_type, id, title, traces_to]
    properties:
      artifact_type: { type: string }
      id: { type: string }
      title: { type: string }
      traces_to: { type: array }
linkSchemas: {}
interviews:
  plan:
    itemType: plan_answers
    completenessRule: all_required
    questions:
      - key: artifact_id
        prompt: "Plan id, for example PLAN-001."
        type: text
        required: true
      - key: slug
        prompt: "Filename slug without the plan id."
        type: text
        required: true
      - key: title
        prompt: "Implementation plan title."
        type: text
        required: true
      - key: requirement_ids
        prompt: "Comma-separated accepted requirement ids this plan traces to."
        type: text
        required: true
      - key: readiness_notes
        prompt: "Known blockers, assumptions, or readiness notes."
        type: text
        required: true
artifactTemplates:
  implementation_plan:
    source: templates/implementation-plan/default.md
    target: spec/plans/${items.plan_answers.plan.id}-${items.plan_answers.plan.slug}.md
    phase: plan_drafted
    frontmatterSchema: ImplementationPlanSchema
recipes:
  draft-and-validate:
    description: Record planning inputs, draft the traced plan, validate it, then stop at acceptance.
    steps:
      - command: advance
        to: evidence_recorded
      - command: advance
        to: plan_drafted
      - command: advance
        to: validated
      - command: advance
        to: accepted
