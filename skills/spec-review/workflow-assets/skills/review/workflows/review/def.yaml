name: review
version: 0.2.0
description: Run a composite specification review producing validated SpecReview docs.
initialPhase: intake
phases:
  - { name: intake }
  - { name: analyses_run }
  - { name: reviews_rendered }
  - { name: validated }
  - { name: accepted, terminal: true }
transitions:
  - from: intake
    to: analyses_run
    invariants:
      - "interview.complete:request"
    defaultGate: auto
  - from: analyses_run
    to: reviews_rendered
    invariants: []
    defaultGate: auto
  - from: reviews_rendered
    to: validated
    invariants: []
    defaultGate: auto
  - from: validated
    to: accepted
    invariants:
      - "selected_analyses_covered"
    defaultGate: hitl
itemSchemas:
  operation_request: {}
  # One per analysis the agent ran + validated: a SpecReview doc on disk.
  review_doc:
    required: [analysis, path]
    properties:
      analysis: { type: string }
      path: { type: string }
linkSchemas: {}
interviews:
  request:
    itemType: operation_request
    completenessRule: all_required
    questions:
      - key: scope
        prompt: "Spec paths, requirement ids, or graph scope to review."
        type: text
        required: true
      - key: review_set
        prompt: "Review set: 'base' (skill checklist only), 'all' (the six analyses), or 'subset'."
        type: enum
        options: [base, all, subset]
        required: true
      - key: selected_analyses
        prompt: "Analyses to run as a list, drawn from: failure-domain, integrity, dependency, evidence, risk-complexity, scope-boundary. Use all six for 'all'; the chosen ones for 'subset'; leave empty for 'base'."
        type: list<text>
        required: false
recipes:
  run-to-review:
    description: Record inputs, then advance through analyses, rendering, validation, to acceptance.
    steps:
      - command: advance
        to: analyses_run
      - command: advance
        to: reviews_rendered
      - command: advance
        to: validated
      - command: advance
        to: accepted
